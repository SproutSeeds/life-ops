<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#1a2e1a"/>
      <stop offset="100%" stop-color="#0a0d0b"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- ring 4 — outermost (r≈14) -->
  <g transform="translate(16,16) rotate(36)" fill="none" stroke="#b8ff4d" stroke-width="0.7" stroke-linecap="round">
    <path d="M0 -14 Q8.7 -7 7.9 1.7"       opacity="0.14"/>
    <path d="M11.8 -8.7 Q10.5 1.7 1.7 7.9"  opacity="0.10"/>
    <path d="M12.2 3.5 Q3.5 8.7 -5.2 6.1"   opacity="0.07"/>
    <path d="M0 14 Q-8.7 7 -7.9 -1.7"       opacity="0.14"/>
    <path d="M-11.8 8.7 Q-10.5 -1.7 -1.7 -7.9" opacity="0.10"/>
    <path d="M-12.2 -3.5 Q-3.5 -8.7 5.2 -6.1"  opacity="0.07"/>
  </g>

  <!-- ring 3 (r≈11) -->
  <g transform="translate(16,16) rotate(24)" fill="none" stroke="#b8ff4d" stroke-width="0.9" stroke-linecap="round">
    <path d="M0 -11 Q6.9 -5.5 6.2 1.4"      opacity="0.28"/>
    <path d="M9.3 -6.9 Q8.3 1.4 1.4 6.2"     opacity="0.20"/>
    <path d="M9.6 2.8 Q2.8 6.9 -4.1 4.8"     opacity="0.14"/>
    <path d="M0 11 Q-6.9 5.5 -6.2 -1.4"      opacity="0.28"/>
    <path d="M-9.3 6.9 Q-8.3 -1.4 -1.4 -6.2" opacity="0.20"/>
    <path d="M-9.6 -2.8 Q-2.8 -6.9 4.1 -4.8" opacity="0.14"/>
  </g>

  <!-- ring 2 (r≈8) -->
  <g transform="translate(16,16) rotate(12)" fill="none" stroke="#b8ff4d" stroke-width="1.1" stroke-linecap="round">
    <path d="M0 -8 Q5 -4 4.5 1"           opacity="0.50"/>
    <path d="M6.8 -5 Q6 1 1 4.5"           opacity="0.38"/>
    <path d="M7 2 Q2 5 -3 3.5"             opacity="0.28"/>
    <path d="M0 8 Q-5 4 -4.5 -1"           opacity="0.50"/>
    <path d="M-6.8 5 Q-6 -1 -1 -4.5"       opacity="0.38"/>
    <path d="M-7 -2 Q-2 -5 3 -3.5"         opacity="0.28"/>
  </g>

  <!-- ring 1 — innermost blades (r≈5.2) -->
  <g transform="translate(16,16)" fill="none" stroke="#b8ff4d" stroke-width="1.3" stroke-linecap="round">
    <path d="M0 -5.2 Q3.2 -2.6 2.9 0.6"    opacity="0.75"/>
    <path d="M4.4 -3.2 Q3.9 0.6 0.6 2.9"    opacity="0.58"/>
    <path d="M4.6 1.3 Q1.3 3.2 -1.9 2.3"    opacity="0.42"/>
    <path d="M0 5.2 Q-3.2 2.6 -2.9 -0.6"    opacity="0.75"/>
    <path d="M-4.4 3.2 Q-3.9 -0.6 -0.6 -2.9" opacity="0.58"/>
    <path d="M-4.6 -1.3 Q-1.3 -3.2 1.9 -2.3" opacity="0.42"/>
  </g>
</svg>
